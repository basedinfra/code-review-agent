name: Publish image

# Builds + publishes on a SemVer tag push (e.g. v1.0.0). PRs build amd64 and
# smoke-test only (no push). The moving :v1 tag is refreshed by weekly-rebuild.yml.

on:
  pull_request:
  push:
    tags: ['v*']

# Cancel superseded PR builds; never cancel a tag (release) build mid-push.
concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: tags
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO="ghcr.io/${OWNER}/code-review-agent"
          DATE=$(date -u +%Y%m%d)
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}   # e.g. v1.0.0
            MAJOR=${VERSION%%.*}               # e.g. v1
          else
            VERSION="pr-${GITHUB_SHA::7}"
            MAJOR="$VERSION"
          fi
          {
            echo "tags<<EOF"
            echo "${REPO}:${VERSION}"
            echo "${REPO}:${MAJOR}"
            echo "${REPO}:${MAJOR}.${DATE}"
            echo "EOF"
            echo "primary=${REPO}:${VERSION}"
          } >> "$GITHUB_OUTPUT"

      - name: Build amd64 for smoke test
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: smoke-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run smoke test
        run: bash test/smoke.sh smoke-test:latest

      - name: Build + push multi-arch
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Verify multi-arch manifest
        if: github.event_name != 'pull_request'
        run: docker buildx imagetools inspect "${{ steps.tags.outputs.primary }}"
