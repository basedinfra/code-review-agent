name: Weekly rebuild

# Refresh the moving :v1 tag with the current upstream node base image and any
# security patches. no-cache + pull are intentional — without them the build
# would reuse cached layers and ship a stale base.
#
# DIGEST OWNERSHIP: BaseInfra consumes this image digest-pinned. After a weekly
# rebuild publishes a new :v1 digest, the consuming repo's CODE_REVIEW_AGENT_IMAGE
# constant must be bumped manually (Renovate is not yet enabled for it).

on:
  schedule:
    - cron: '0 8 * * 1' # Mondays 08:00 UTC
  workflow_dispatch:

# Never run two rebuilds at once (a scheduled run overlapping a manual dispatch).
concurrency:
  group: weekly-rebuild-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: tags
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO="ghcr.io/${OWNER}/code-review-agent"
          DATE=$(date -u +%Y%m%d)
          {
            echo "tags<<EOF"
            echo "${REPO}:v1"
            echo "${REPO}:v1.${DATE}"
            echo "EOF"
            echo "primary=${REPO}:v1"
          } >> "$GITHUB_OUTPUT"

      - name: Build amd64 for smoke test (no cache, force fresh upstream)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: smoke-test:latest
          no-cache: true
          pull: true

      - name: Run smoke test
        run: bash test/smoke.sh smoke-test:latest

      - name: Build + push multi-arch
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          no-cache: true
          pull: true
          provenance: true
          sbom: true

      - name: Verify multi-arch manifest
        run: docker buildx imagetools inspect "${{ steps.tags.outputs.primary }}"
